<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        table {
            font-family: Arial, Helvetica, sans-serif;
            border-collapse: collapse;
            width: 100%;
            }
        
        td, 
        th {
            border: 1px solid black;
            padding: 5px;
            }
        
        th {
            background-color: rgb(48, 212, 54);
            color: #fff;
            }

        tr:nth-child(even){
            background-color: #d5c1c1;}

    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th>No</th>
                <th>Nama</th>
                <th>NIM</th>
            </tr>
        </thead>
        <body>
            <tr>
               <td>1</td>
               <td>arfian</td>
               <td>2302021008</td>
            </tr>
            <tr>
                <td>2</td>
                <td>bejo</td>
                <td>2302021001</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Jan</td>
                <td>2302021010</td>
            </tr>
        </body>
    </table>
</body>
</html>
